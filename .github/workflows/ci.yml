name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
  package-smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build
      - name: Install wheel in clean venv
        run: |
          python -m venv /tmp/hx-smoke
          source /tmp/hx-smoke/bin/activate
          pip install dist/*.whl
          hx --help
      - name: Smoke installed CLI
        run: |
          source /tmp/hx-smoke/bin/activate
          tmpdir=$(mktemp -d)
          cd "$tmpdir"
          git init
          mkdir -p src tests
          printf 'print("hello")\n' > src/demo.py
          printf 'from src.demo import *\n\ndef test_smoke():\n    assert True\n' > tests/test_demo.py
          hx init
          hx hex build
          hx hex validate
